<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GPS Continuous STA V2</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
    color: #222;
  }

  .container {
    padding: 30px 20px;
  }

  .logo {
    width: 90px;
    margin-top: 10px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 52px;
    margin-bottom: 25px;
    color: #ff7a00;
    font-weight: 900;
  }

  .title {
    font-size: 26px;
    font-weight: bold;
    margin-top: 10px;
    margin-bottom: 35px;
  }

  .sta {
    font-size: 72px;
    font-weight: 900;
    color: #ff7a00;
    margin-top: 20px;
    margin-bottom: 10px;
  }

  .offset {
    font-size: 28px;
    margin-bottom: 25px;
  }

  .segment {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .jalur {
    font-size: 24px;
    font-weight: bold;
    color: #ff7a00;
    margin-bottom: 35px;
  }

  .accuracy {
    font-size: 20px;
    color: #666;
  }

  .status {
    margin-top: 25px;
    font-size: 16px;
    color: #999;
  }

  .good {
    color: #0f9d58;
  }

  .bad {
    color: red;
  }
</style>
</head>
<body>

<div class="container">

  <!-- GANTI LINK LOGO DI SINI -->
<img
  src="https://hafidhoasyam.github.io/Automatic-STA-Tangerang-Merak---MMS/Logo_MMS.png"
  class="logo"
  alt="Logo"
/>

  <div class="title">GPS Continuous STA Tangerang - Merak</div>

  <div class="sta" id="sta">Loading...</div>

  <div class="offset" id="offset">Offset -</div>

  <div class="segment" id="segment">Segment -</div>

  <div class="jalur" id="jalur">Jalur -</div>

  <div class="accuracy" id="accuracy">GPS accuracy -</div>

  <div class="status" id="status">Waiting GPS...</div>

</div>

<script>

// =========================
// CSV URL
// =========================

const csvUrl = "https://hafidhoasyam.github.io/Automatic-STA-Tangerang-Merak---MMS/sta_tm_R1.csv";

// =========================
// VARIABLES
// =========================

let staData = [];
let previousSTA = null;
let smoothedLat = null;
let smoothedLon = null;

// =========================
// LOAD CSV
// =========================

fetch(csvUrl)
  .then(response => response.text())
  .then(text => {

    const rows = text.trim().split("\n");

    for(let i=1; i<rows.length; i++){

      const cols = rows[i].split(",");

      staData.push({
        sta: parseInt(cols[0]),
        lat: parseFloat(cols[1]),
        lon: parseFloat(cols[2]),
        segment: cols[3]
      });
    }

    document.getElementById("status").innerHTML =
      "STA database loaded";

    startGPS();
  });

// =========================
// START GPS
// =========================

function startGPS(){

  if(!navigator.geolocation){
    alert("GPS tidak didukung browser");
    return;
  }

  navigator.geolocation.watchPosition(updatePosition, gpsError, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 10000
  });
}

// =========================
// GPS UPDATE
// =========================

function updatePosition(position){

  const lat = position.coords.latitude;
  const lon = position.coords.longitude;
  const accuracy = position.coords.accuracy;

  // =========================
  // FILTER GPS JELEK
  // =========================

  if(accuracy > 12){

    document.getElementById("status").innerHTML =
      "Poor GPS signal";

    document.getElementById("status").className =
      "status bad";

    return;
  }

  // =========================
  // SMOOTHING GPS
  // =========================

  if(smoothedLat === null){
    smoothedLat = lat;
    smoothedLon = lon;
  }

  smoothedLat = (smoothedLat * 0.7) + (lat * 0.3);
  smoothedLon = (smoothedLon * 0.7) + (lon * 0.3);

  // =========================
  // FIND NEAREST STA
  // =========================

  let nearest = null;
  let minDistance = 999999;

  for(let i=0; i<staData.length; i++){

    const d = distance(
      smoothedLat,
      smoothedLon,
      staData[i].lat,
      staData[i].lon
    );

    if(d < minDistance){
      minDistance = d;
      nearest = staData[i];
    }
  }

  // =========================
  // MIDPOINT LOCK 2.5 METER
  // =========================

  if(previousSTA !== null){

    const diff = Math.abs(nearest.sta - previousSTA);

    if(diff <= 5 && minDistance < 2.5){
      nearest.sta = previousSTA;
    }
  }

  // =========================
  // DETECT JALUR
  // =========================

  let jalur = "-";

  if(previousSTA !== null){

    if(nearest.sta > previousSTA){
      jalur = "Jalur A";
    }
    else if(nearest.sta < previousSTA){
      jalur = "Jalur B";
    }
  }

  previousSTA = nearest.sta;

  // =========================
  // FORMAT STA
  // =========================

  const staFormatted = formatSTA(nearest.sta);

  // =========================
  // UPDATE UI
  // =========================

  document.getElementById("sta").innerHTML =
    "STA " + staFormatted;

  document.getElementById("offset").innerHTML =
    "Offset " + minDistance.toFixed(1) + " m";

  document.getElementById("segment").innerHTML =
    nearest.segment;

  document.getElementById("jalur").innerHTML =
    jalur;

  document.getElementById("accuracy").innerHTML =
    "GPS accuracy " + accuracy.toFixed(1) + " m";

  document.getElementById("status").innerHTML =
    "GPS active";

  document.getElementById("status").className =
    "status good";
}

// =========================
// GPS ERROR
// =========================

function gpsError(error){

  document.getElementById("status").innerHTML =
    "GPS access denied";

  document.getElementById("status").className =
    "status bad";
}

// =========================
// DISTANCE CALCULATION
// =========================

function distance(lat1, lon1, lat2, lon2){

  const R = 6371000;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

// =========================
// FORMAT STA
// =========================

function formatSTA(sta){

  const km = Math.floor(sta / 1000);
  const meter = sta % 1000;

  return km + "+" + meter.toString().padStart(3, '0');
}

</script>

</body>
</html>
